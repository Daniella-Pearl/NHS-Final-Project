<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NyondoStock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="../public/css/dashboard.css" />
    <link rel="stylesheet" href="../public/css/supplierReg.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Serif:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Miniver&family=Montagu+Slab:opsz,wght@16..144,100..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Prata&family=Sofia&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Spectral:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <nav class="sidebar">
        <div class="brand">
          <img
            src="../public/images/generated-1774986091754.png"
            alt="NyondoStock"
            class="logo"
          />
          <h1>NyondoStock System</h1>
          <p>Supplier Management</p>
        </div>
        <div class="nav-menu-container">
          <a href="./stockmgtpage.html" class="nav-link"
            ><i class="fa fa-th-large"></i><span>Dashboard</span></a
          >
          <a href="./newCustomer.html" class="nav-link"
            ><i class="fa fa-users"></i> <span>Supplier List</span></a
          >
          <a href="./stockmgtpage.html" class="nav-link"
            ><i class="fa fa-right-from-bracket"></i> <span>Log out</span></a
          >
        </div>
      </nav>

      <div class="main-content">
        <header class="topbar">
          <h2>Supplier Registration Form</h2>
          <div class="user-info">
            <span class="badge"
              >Supplier Management Account <i class="fa fa-circle-user"></i
            ></span>
          </div>
        </header>
        <div class="containers">
          <form class="form-card" action="" method="">
            <div class="form-section">
              <div class="section-title">Identity & Contact</div>
              <div class="grid">
                <div class="form-group">
                  <label>Supplier Name</label>
                  <input
                    type="text"
                    name="supplierName"
                    placeholder="John Smith"
                    required
                  />
                </div>
                <div class="form-group">
                  <label>Company Name</label>
                  <input
                    type="text"
                    name="companyName"
                    placeholder="Ace Building Supplies"
                    required
                  />
                </div>
                <div class="form-group">
                  <label>Phone Number</label>
                  <input
                    type="tel"
                    name="supplierContact"
                    placeholder="+256..."
                    required
                  />
                </div>
                <div class="form-group">
                  <label>Email Address</label>
                  <input
                    type="email"
                    name="supplierEmail"
                    placeholder="sales@ace.com"
                    required
                  />
                </div>
              </div>
            </div>

            <div class="form-section">
              <div class="section-title">Logistics</div>
              <div class="grid">
                <div class="form-group full-width">
                  <label>Physical Address</label>
                  <input
                    type="text"
                    name="supplierAddress"
                    placeholder="Plot 45, Industrial Area"
                    required
                  />
                </div>
                <div class="form-group">
                  <label>City</label>
                  <input
                    type="text"
                    name="supplierCity"
                    placeholder="Kampala"
                  />
                </div>
                <div class="form-group">
                  <label>Product Supplied</label>
                  <select name="category">
                    <option value="nails_1_inch">Nails (1 inch)</option>
                    <option value="nails_3_inch">Nails (3 inch)</option>
                    <option value="nails_4_inch">Nails (4 inch)</option>
                    <option value="nails_5_inch">Nails (5 inch)</option>
                    <option value="roofing_nails_5kg">
                      Roofing Nails (5 kg packs)
                    </option>
                    <option value="wheelbarrows">Wheelbarrows</option>
                    <option value="iron_sheets">
                      Iron Sheets (Various Colors/Gauges)
                    </option>
                    <option value="barbed_wire_high">
                      Barbed Wire (High Tensile)
                    </option>
                    <option value="barbed_wire_low">
                      Barbed Wire (Low Tensile)
                    </option>
                    <option value="wire_mesh">Wire Mesh</option>
                    <option value="cem_iin">Cement (cem iiN)</option>
                    <option value="cem_iiin">Cement (cem iiiN)</option>
                    <option value="iron_bars_10mm">Iron Bars (10 mm)</option>
                    <option value="iron_bars_12mm">Iron Bars (12 mm)</option>
                    <option value="iron_bars_16mm">Iron Bars (16 mm)</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Supplied In:</label>
                  <select name="supplyForm">
                    <option value="Retail">Retail</option>
                    <option value="Wholesale">Wholesale</option>
                    <option value="Promotion">Promotion</option>
                    <option value="OfferDonation">Offer or Donation</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Category</label>
                  <select name="materials" id="materials">
                    <option value="structural">
                      Structural and Binding Materials
                    </option>
                    <option value="fasteners">Fasteners</option>
                    <option value="roofing_fencing">Roofing and Fencing</option>
                    <option value="equipment">Equipment</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="form-section">
              <div class="section-title">Payment Terms</div>
              <div class="grid">
                <div class="form-group">
                  <label>Preferred Method</label>
                  <select name="payment">
                    <option value="cash">Cash</option>
                    <option value="bank">Bank Transfer</option>
                    <option value="mobilemoney">Mobile Money</option>
                    <option value="cheque">Cheque</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Credit Allowed?</label>
                  <div class="radio-group">
                    <label class="radio-item"
                      ><input type="radio" name="credit" checked /> Yes</label
                    >
                    <label class="radio-item"
                      ><input type="radio" name="credit" /> No</label
                    >
                  </div>
                </div>
                <div class="form-group">
                  <label>Credit Limit ($)</label>
                  <input type="number" name="creditLimit" placeholder="0.00" />
                </div>
              </div>
            </div>

            <div class="form-section">
              <div class="form-group">
                <label>Additional Notes</label>
                <textarea
                  rows="3"
                  name="message"
                  placeholder="Contract terms, delivery schedules..."
                ></textarea>
              </div>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn-save">Save Supplier</button>
              <button type="reset" class="btn btn-reset">Reset</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
