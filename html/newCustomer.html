<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NyondoStock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="../public/css/dashboard.css" />
    <link rel="stylesheet" href="../public/css/customer.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Serif:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Miniver&family=Montagu+Slab:opsz,wght@16..144,100..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Prata&family=Sofia&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Spectral:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <section id="registration" class="card">
      <h2>New Customer Registration</h2>
      <form action="customer" method="post">
        <div class="profile-upload">
          <label for="imageUpload">
            <div class="avatar-preview">
              <i class="fas fa-camera"></i>
              <span id="initials">?</span>
            </div>
          </label>
          <input type="file" id="imageUpload" name="image" accept="image/*" />
          <p style="font-size: 0.8rem; margin-top: 5px; color: #666">
            Upload Profile Picture
          </p>
        </div>

        <div class="form-grid">
          <input
            type="text"
            name="fullname"
            placeholder="Full Name"
            id="fullname"
            required
          />
          <input
            type="email"
            name="email"
            placeholder="Email Address"
            id="email"
            required
          />
          <input
            type="tel"
            placeholder="Phone Number"
            name="phonenumber"
            id="phonenumber"
            required
          />

          <input type="text" placeholder="NIN" id="nin" required />
          <textarea
            placeholder="Physical Address (Street, Building, etc.)"
            name="address"
            class="full-width"
            rows="2"
          ></textarea>

          <input type="date" name="date" placeholder="Enter Date" />
        </div>
        <div class="salespage">
          <button type="submit" class="btn-action btn-green">
            Complete Registration
          </button>
        </div>
        <div class="salespage back">
          <a href="./customerscheme.html">
            <button type="submit" class="btn-action btn-blue">
              Return To Dashboard
            </button></a
          >
        </div>
      </form>
    </section>
  </body>
</html>
