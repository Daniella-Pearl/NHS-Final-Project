<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NyondoStock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Serif:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Miniver&family=Montagu+Slab:opsz,wght@16..144,100..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Prata&family=Sofia&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Spectral:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"> -->
    <link rel="stylesheet" href="../public/css/login.css" />
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <div class="brand">
          <img
            src="/public/images/generated-1774986091754.png"
            alt="Logo"
            class="logo"
          />
          <h1>NyondoStock System</h1>
          <p>Welcome back! Please enter your details.</p>
        </div>
      </div>
      <div class="main">
        <div class="login_form">
          <form action="/login" method="post" id="loginForm" class="login-form">
            <h2>Login</h2>

            <div class="input-group">
              <label>Username</label>
              <input
                type="text"
                id="username"
                name="username"
                required
                placeholder="Enter username"
              />
            </div>

            <div class="input-group">
              <label>Email</label>
              <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="Enter email"
              />
            </div>

            <div class="input-group">
              <label>Password</label>
              <div class="password">
                <input
                  type="password"
                  id="password"
                  name="password"
                  required
                  placeholder="••••••••"
                />
                <i class="fa-solid fa-eye" id="togglePassword"></i>
              </div>
            </div>

            <div class="footer">
              <a href="./password" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">Login</button>
          </form>
        </div>
      </div>
    </div>

    <script src="styles.js"></script>
  </body>
</html>
